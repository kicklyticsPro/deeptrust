<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Turf - Projection Temps</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏇 Analyse Turf - Projection Temps</h1>
            <p class="subtitle">Méthode avancée : TAS, head-to-head, projection temps, tendance, adaptation</p>
        </header>

        <section class="controls">
            <div class="form-row">
                <div class="field">
                    <label for="dateInput">Date (JJMMAAAA)</label>
                    <input type="text" id="dateInput" placeholder="25062026" maxlength="8">
                </div>
                <div class="field">
                    <label for="reunionSelect">Réunion</label>
                    <select id="reunionSelect">
                        <option value="">Choisir une réunion</option>
                    </select>
                </div>
                <div class="field">
                    <label for="courseSelect">Course</label>
                    <select id="courseSelect">
                        <option value="">Choisir une course</option>
                    </select>
                </div>
                <div class="field btn-field">
                    <button id="loadBtn" class="btn-primary">Analyser la course</button>
                </div>
            </div>
            <div id="loading" class="loading hidden">Chargement des données...</div>
            <div id="errorMsg" class="error hidden"></div>
        </section>

        <section id="courseInfo" class="course-info hidden">
            <h2 id="courseTitle"></h2>
            <div id="courseMeta" class="meta"></div>
        </section>

        <section id="ranking" class="ranking hidden"></section>
        <section id="results" class="results hidden"></section>
    </div>

    <script>
        const dateInput = document.getElementById('dateInput');
        const reunionSelect = document.getElementById('reunionSelect');
        const courseSelect = document.getElementById('courseSelect');
        const loadBtn = document.getElementById('loadBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const courseInfo = document.getElementById('courseInfo');
        const courseTitle = document.getElementById('courseTitle');
        const courseMeta = document.getElementById('courseMeta');
        const results = document.getElementById('results');

        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        dateInput.value = dd + mm + yyyy;

        let reunionsData = [];
        let selectedCourseData = null;

        async function loadReunions() {
            const date = dateInput.value;
            if (!date || date.length !== 8) {
                showError('Date invalide. Format : JJMMAAAA');
                return;
            }
            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            try {
                const res = await fetch(`/api/reunions?date=${date}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                reunionsData = data.reunions || [];
                populateReunions();
            } catch (e) {
                showError('Erreur chargement réunions : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function populateReunions() {
            reunionSelect.innerHTML = '<option value="">Choisir une réunion</option>';
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            reunionsData.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.numOfficiel;
                opt.textContent = `R${r.numOfficiel} - ${r.hippodrome.libelleCourt || 'Hippodrome'} (${r.pays.libelle || 'FR'})`;
                reunionSelect.appendChild(opt);
            });
        }

        function populateCourses() {
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            const numReunion = reunionSelect.value;
            const reunion = reunionsData.find(r => String(r.numOfficiel) === numReunion);
            if (!reunion) return;

            reunion.courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.numOrdre;
                opt.textContent = `C${c.numOrdre} - ${c.libelleCourt || c.libelle || 'Course'} (${c.distance || '?'}m ${c.discipline || ''})`;
                opt.dataset.json = JSON.stringify(c);
                courseSelect.appendChild(opt);
            });
        }

        function updateCourseInfo() {
            const opt = courseSelect.selectedOptions[0];
            if (!opt || !opt.dataset.json) {
                courseInfo.classList.add('hidden');
                return;
            }
            selectedCourseData = JSON.parse(opt.dataset.json);
            courseTitle.textContent = `C${selectedCourseData.numOrdre} - ${selectedCourseData.libelle || ''}`;
            courseMeta.innerHTML = `
                <span><strong>Hippodrome:</strong> ${selectedCourseData.hippodrome?.libelleCourt || 'N/A'}</span>
                <span><strong>Distance:</strong> ${selectedCourseData.distance || 'N/A'} ${selectedCourseData.distanceUnit || ''}</span>
                <span><strong>Corde:</strong> ${selectedCourseData.corde || 'N/A'}</span>
                <span><strong>Discipline:</strong> ${selectedCourseData.discipline || 'N/A'} / ${selectedCourseData.specialite || 'N/A'}</span>
                <span><strong>Partants:</strong> ${selectedCourseData.nombreDeclaresPartants || 'N/A'}</span>
                <span><strong>Type:</strong> ${selectedCourseData.categorieParticularite || 'N/A'}</span>
                <span><strong>Condition:</strong> ${selectedCourseData.conditionAge || ''} - ${selectedCourseData.conditionSexe || ''}</span>
            `;
            courseInfo.classList.remove('hidden');
        }

        async function loadAnalysis() {
            if (!reunionSelect.value || !courseSelect.value) {
                showError('Sélectionnez une réunion et une course.');
                return;
            }
            const date = dateInput.value;
            const reunion = `R${reunionSelect.value}`;
            const course = courseSelect.value;

            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');
            try {
                const res = await fetch(`/api/analyse?date=${date}&reunion=${reunion}&course=${course}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                renderAnalyses(data.analyses);
            } catch (e) {
                showError('Erreur analyse : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function renderAnalyses(analyses) {
            results.innerHTML = '';
            if (!analyses || analyses.length === 0) {
                results.innerHTML = '<p class="no-data">Aucun participant trouvé.</p>';
                results.classList.remove('hidden');
                document.getElementById('ranking').classList.add('hidden');
                return;
            }

            const bestScore = analyses[0]?.score_final ?? 0;
            const courseDistance = selectedCourseData?.distance || 0;

            // --- Classement ---
            let rankingHtml = '';
            if (analyses[0].score_final !== undefined) {
                rankingHtml += '<div class="podium">';
                for (let i = 0; i < Math.min(3, analyses.length); i++) {
                    const a = analyses[i];
                    const ecart = a.ecart_longueurs ?? '?';
                    const ecartTxt = ecart > 0 ? `+${ecart} L` : (ecart == 0 ? '0 L' : 'N/A');
                    const cls = i === 0 ? 'first' : (i === 1 ? 'second' : 'third');
                    const conf = a.indice_confiance ?? 0;
                    const confClass = conf >= 70 ? 'high' : (conf >= 40 ? 'mid' : 'low');
                    const temps = a.temps_projete_formatted || 'N/A';
                    rankingHtml += `
                        <div class="podium-item ${cls}">
                            <div class="rank">${i+1}</div>
                            <div class="podium-name">${a.attitude.nom || 'N/A'} <span class="podium-num">N°${a.attitude.numPmu}</span></div>
                            <div class="podium-temps">${temps}</div>
                            <div class="podium-detail">${ecartTxt} · Conf: ${conf}%</div>
                            <div class="confiance-bar ${confClass}"><div class="conf-fill" style="width:${conf}%"></div></div>
                        </div>
                    `;
                }
                rankingHtml += '</div>';

                rankingHtml += '<div class="rank-table"><h3>Classement - Projection Temps</h3><table><thead><tr><th>Rang</th><th>N°</th><th>Nom</th><th>Temps projeté</th><th>Écart</th><th>Conf.</th><th>TAS moyen</th><th>TAS récent</th><th>Fiabilité</th><th>Tendance</th><th>Courses eff.</th></tr></thead><tbody>';
                analyses.forEach((a, i) => {
                    const ecart = a.ecart_longueurs ?? '?';
                    const ecartTxt = ecart > 0 ? `+${ecart} L` : (ecart == 0 ? '0 L' : 'N/A');
                    const tend = a.tendance < 0 ? '↘' : (a.tendance > 0 ? '↗' : '→');
                    const conf = a.indice_confiance ?? 0;
                    rankingHtml += `<tr><td class="rank-col">${i+1}</td><td>${a.attitude.numPmu}</td><td><strong>${a.attitude.nom}</strong></td><td class="score-total">${a.temps_projete_formatted || 'N/A'}</td><td>${ecartTxt}</td><td class="conf-${conf >= 70 ? 'high' : (conf >= 40 ? 'mid' : 'low')}">${conf}%</td><td>${a.tas_moyen || 'N/A'}</td><td>${a.tas_recent || 'N/A'}</td><td>${a.fiabilite || 'N/A'}</td><td>${tend} ${a.tendance || 0}</td><td>${a.nombre_effectif || 0}</td></tr>`;
                });
                rankingHtml += '</tbody></table></div>';
            }
            const rankingSection = document.getElementById('ranking');
            rankingSection.innerHTML = rankingHtml;
            rankingSection.classList.remove('hidden');

            // --- Cartes détaillées ---
            analyses.forEach((a, idx) => {
                const att = a.attitude;
                const card = document.createElement('div');
                card.className = 'horse-card';

                const ecart = a.ecart_longueurs ?? '?';
                const ecartTxt = ecart > 0 ? `+${ecart} longueurs` : (ecart == 0 ? '0 longueur' : 'N/A');
                const tend = a.tendance < 0 ? '↘ Amélioration' : (a.tendance > 0 ? '↗ Baisse' : '→ Stable');
                const conf = a.indice_confiance ?? 0;
                const confClass = conf >= 70 ? 'high' : (conf >= 40 ? 'mid' : 'low');
                const confLabel = conf >= 70 ? 'Fiable' : (conf >= 40 ? 'Moyen' : 'Incertain');

                let html = `
                    <div class="rank-badge" title="Rang ${idx+1}">${idx+1}</div>
                    <div class="horse-header">
                        <div class="num">${att.numPmu}</div>
                        <div class="infos">
                            <h3>${att.nom || 'N/A'} <span class="age">${att.age || '?'} ans ${att.sexe || ''}</span></h3>
                            <div class="tags">
                                <span class="tag">${att.race || ''}</span>
                                <span class="tag">Corde ${att.corde || '?'}</span>
                                <span class="tag">Poids ${att.poids ? (att.poids/10 + ' kg') : 'N/A'}</span>
                                <span class="tag">${att.jockey || 'N/A'}</span>
                                <span class="tag trainer">${att.entraineur || 'N/A'}</span>
                                <span class="tag">${att.oeilleres || ''}</span>
                            </div>
                        </div>
                        <div class="score-box">
                            <div class="score-label">Temps projeté</div>
                            <div class="score-value">${a.temps_projete_formatted || 'N/A'}</div>
                            <div class="score-detail">${ecartTxt}</div>
                        </div>
                    </div>
                    <div class="confiance-row">
                        <div class="conf-label">Indice de confiance: ${confLabel} (${conf}%)</div>
                        <div class="confiance-bar ${confClass}"><div class="conf-fill" style="width:${conf}%"></div></div>
                    </div>
                `;

                // Breakdown
                html += `<div class="score-breakdown">
                    <h4>Composantes du score</h4>
                    <div class="breakdown-grid">
                        <div class="bd-item"><div class="bd-label">TAS Moyen</div><div class="bd-val">${a.tas_moyen || 'N/A'}</div><div class="bd-sub">Pondéré temporel</div></div>
                        <div class="bd-item"><div class="bd-label">TAS Récent</div><div class="bd-val">${a.tas_recent || 'N/A'}</div><div class="bd-sub">3 dernières courses</div></div>
                        <div class="bd-item"><div class="bd-label">Adaptation</div><div class="bd-val">${a.adaptation?.tas_adaptation || 'N/A'}</div><div class="bd-sub">Score: ${a.adaptation?.score || 0}/100</div></div>
                        <div class="bd-item ${a.tendance < 0 ? 'positive' : (a.tendance > 0 ? 'negative' : '')}"><div class="bd-label">Tendance</div><div class="bd-val">${tend}</div><div class="bd-sub">${a.tendance || 0} s/km/course</div></div>
                        <div class="bd-item"><div class="bd-label">Fiabilité</div><div class="bd-val">${a.fiabilite || 'N/A'}</div><div class="bd-sub">Écart-type TAS</div></div>
                        <div class="bd-item"><div class="bd-label">Head-to-Head</div><div class="bd-val">${a.head_to_head?.delta_h2h !== null ? a.head_to_head.delta_h2h : 'N/A'}</div><div class="bd-sub">${a.head_to_head?.nb_affrontements || 0} affrontements</div></div>
                    </div>
                </div>`;

                // Bonus/Malus contextuels
                if (a.bonuses && Object.keys(a.bonuses).length > 0) {
                    html += `<div class="bonus-malus"><h4>Bonus/Malus contextuels</h4><div class="bonus-grid">`;
                    Object.entries(a.bonuses).forEach(([k, v]) => {
                        const cls = v > 0 ? 'positive' : (v < 0 ? 'negative' : '');
                        html += `<div class="bonus-item ${cls}"><span class="bonus-name">${k.replace(/_/g, ' ')}</span><span class="bonus-val">${v > 0 ? '+' : ''}${v}</span></div>`;
                    });
                    html += `<div class="bonus-item total"><span class="bonus-name">Total</span><span class="bonus-val">${a.total_bonus > 0 ? '+' : ''}${a.total_bonus}</span></div>`;
                    html += `</div></div>`;
                }

                // Historique TAS
                if (a.tas_history && a.tas_history.length > 0) {
                    html += `<div class="history"><h4>Historique des courses (Temps Ajusté Standard)</h4><table>
                        <thead>
                            <tr><th>Date</th><th>Hippodrome</th><th>Dist.</th><th>Disc.</th><th>Place</th><th>Terrain</th><th>Corde</th><th>Poids</th><th>Jockey</th><th>Temps/km</th><th>TAS</th></tr>
                        </thead><tbody>`;
                    a.tas_history.forEach(d => {
                        const date = d.date ? new Date(d.date).toLocaleDateString('fr-FR') : 'N/A';
                        html += `<tr>
                            <td>${date}</td>
                            <td>${d.hippodrome || ''}</td>
                            <td>${d.distance || ''}</td>
                            <td>${d.discipline || ''}</td>
                            <td class="place-${d.place === 1 ? '1' : (d.place && d.place <= 3 ? '3' : '')}">${d.place || '-'}</td>
                            <td>${d.etatTerrain || ''}</td>
                            <td>${d.corde || ''}</td>
                            <td>${d.poidsJockey ? (d.poidsJockey + 'kg') : ''}</td>
                            <td>${d.nomJockey || ''}</td>
                            <td class="temps-km">${d.takm_formatted || 'N/A'}</td>
                            <td class="pr-val">${d.tas}</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                html += `</div>`;
                card.innerHTML = html;
                results.appendChild(card);
            });

            results.classList.remove('hidden');
        }

        dateInput.addEventListener('change', loadReunions);
        reunionSelect.addEventListener('change', populateCourses);
        courseSelect.addEventListener('change', updateCourseInfo);
        loadBtn.addEventListener('click', loadAnalysis);

        loadReunions();
    </script>
</body>
</html>
