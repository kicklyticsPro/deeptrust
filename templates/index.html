<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Turf - Stats PMU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏇 Analyse Turf - Statistiques PMU</h1>
            <p class="subtitle">Analyse purement statistique, sans prise en compte des cotes</p>
        </header>

        <section class="controls">
            <div class="form-row">
                <div class="field">
                    <label for="dateInput">Date (JJMMAAAA)</label>
                    <input type="text" id="dateInput" placeholder="25062026" maxlength="8">
                </div>
                <div class="field">
                    <label for="reunionSelect">Réunion</label>
                    <select id="reunionSelect">
                        <option value="">Choisir une réunion</option>
                    </select>
                </div>
                <div class="field">
                    <label for="courseSelect">Course</label>
                    <select id="courseSelect">
                        <option value="">Choisir une course</option>
                    </select>
                </div>
                <div class="field btn-field">
                    <button id="loadBtn" class="btn-primary">Analyser la course</button>
                </div>
            </div>
            <div id="loading" class="loading hidden">Chargement des données...</div>
            <div id="errorMsg" class="error hidden"></div>
        </section>

        <section id="courseInfo" class="course-info hidden">
            <h2 id="courseTitle"></h2>
            <div id="courseMeta" class="meta"></div>
        </section>

        <section id="ranking" class="ranking hidden"></section>
        <section id="results" class="results hidden"></section>
    </div>

    <script>
        const dateInput = document.getElementById('dateInput');
        const reunionSelect = document.getElementById('reunionSelect');
        const courseSelect = document.getElementById('courseSelect');
        const loadBtn = document.getElementById('loadBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const courseInfo = document.getElementById('courseInfo');
        const courseTitle = document.getElementById('courseTitle');
        const courseMeta = document.getElementById('courseMeta');
        const results = document.getElementById('results');

        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        dateInput.value = dd + mm + yyyy;

        let reunionsData = [];
        let selectedCourseData = null;

        async function loadReunions() {
            const date = dateInput.value;
            if (!date || date.length !== 8) {
                showError('Date invalide. Format : JJMMAAAA');
                return;
            }
            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            try {
                const res = await fetch(`/api/reunions?date=${date}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                reunionsData = data.reunions || [];
                populateReunions();
            } catch (e) {
                showError('Erreur chargement réunions : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function populateReunions() {
            reunionSelect.innerHTML = '<option value="">Choisir une réunion</option>';
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            reunionsData.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.numOfficiel;
                opt.textContent = `R${r.numOfficiel} - ${r.hippodrome.libelleCourt || 'Hippodrome'} (${r.pays.libelle || 'FR'})`;
                reunionSelect.appendChild(opt);
            });
        }

        function populateCourses() {
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            const numReunion = reunionSelect.value;
            const reunion = reunionsData.find(r => String(r.numOfficiel) === numReunion);
            if (!reunion) return;

            reunion.courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.numOrdre;
                opt.textContent = `C${c.numOrdre} - ${c.libelleCourt || c.libelle || 'Course'} (${c.distance || '?'}m ${c.discipline || ''})`;
                opt.dataset.json = JSON.stringify(c);
                courseSelect.appendChild(opt);
            });
        }

        function updateCourseInfo() {
            const opt = courseSelect.selectedOptions[0];
            if (!opt || !opt.dataset.json) {
                courseInfo.classList.add('hidden');
                return;
            }
            selectedCourseData = JSON.parse(opt.dataset.json);
            courseTitle.textContent = `C${selectedCourseData.numOrdre} - ${selectedCourseData.libelle || ''}`;
            courseMeta.innerHTML = `
                <span><strong>Hippodrome:</strong> ${selectedCourseData.hippodrome?.libelleCourt || 'N/A'}</span>
                <span><strong>Distance:</strong> ${selectedCourseData.distance || 'N/A'} ${selectedCourseData.distanceUnit || ''}</span>
                <span><strong>Corde:</strong> ${selectedCourseData.corde || 'N/A'}</span>
                <span><strong>Discipline:</strong> ${selectedCourseData.discipline || 'N/A'} / ${selectedCourseData.specialite || 'N/A'}</span>
                <span><strong>Partants:</strong> ${selectedCourseData.nombreDeclaresPartants || 'N/A'}</span>
                <span><strong>Type:</strong> ${selectedCourseData.categorieParticularite || 'N/A'}</span>
                <span><strong>Condition:</strong> ${selectedCourseData.conditionAge || ''} - ${selectedCourseData.conditionSexe || ''}</span>
            `;
            courseInfo.classList.remove('hidden');
        }

        async function loadAnalysis() {
            if (!reunionSelect.value || !courseSelect.value) {
                showError('Sélectionnez une réunion et une course.');
                return;
            }
            const date = dateInput.value;
            const reunion = `R${reunionSelect.value}`;
            const course = courseSelect.value;

            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');
            try {
                const res = await fetch(`/api/analyse?date=${date}&reunion=${reunion}&course=${course}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                renderAnalyses(data.analyses);
            } catch (e) {
                showError('Erreur analyse : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function renderAnalyses(analyses) {
            results.innerHTML = '';
            if (!analyses || analyses.length === 0) {
                results.innerHTML = '<p class="no-data">Aucun participant trouvé.</p>';
                results.classList.remove('hidden');
                document.getElementById('ranking').classList.add('hidden');
                return;
            }

            // --- Classement ---
            let rankingHtml = '';
            if (analyses[0].rating) {
                rankingHtml += '<div class="podium">';
                for (let i = 0; i < Math.min(3, analyses.length); i++) {
                    const a = analyses[i];
                    const r = a.rating || {};
                    const cls = i === 0 ? 'first' : (i === 1 ? 'second' : 'third');
                    rankingHtml += `
                        <div class="podium-item ${cls}">
                            <div class="rank">${i+1}</div>
                            <div class="podium-name">${a.attitude.nom || 'N/A'} <span class="podium-num">N°${a.attitude.numPmu}</span></div>
                            <div class="podium-score">${r.total || 0}</div>
                            <div class="podium-detail">
                                G:${r.global||0} Ré:${r.recent||0} Mus:${r.musique||0} Adap:${r.adaptation||0} BM:${r.bonus||0}
                            </div>
                        </div>
                    `;
                }
                rankingHtml += '</div>';

                rankingHtml += '<div class="rank-table"><h3>Classement complet</h3><table><thead><tr><th>Rang</th><th>N°</th><th>Nom</th><th>Rating</th><th>Global</th><th>Récent</th><th>Musique</th><th>Adaptation</th><th>Bonus</th></tr></thead><tbody>';
                analyses.forEach((a, i) => {
                    const r = a.rating || {};
                    rankingHtml += `<tr><td class="rank-col">${i+1}</td><td>${a.attitude.numPmu}</td><td><strong>${a.attitude.nom}</strong></td><td class="score-total">${r.total || 0}</td><td>${r.global || 0}</td><td>${r.recent || 0}</td><td>${r.musique || 0}</td><td>${r.adaptation || 0}</td><td>${r.bonus || 0}</td></tr>`;
                });
                rankingHtml += '</tbody></table></div>';
            }
            const rankingSection = document.getElementById('ranking');
            rankingSection.innerHTML = rankingHtml;
            rankingSection.classList.remove('hidden');

            // --- Cartes détaillées ---
            analyses.forEach((a, idx) => {
                const att = a.attitude;
                const glob = a.global;
                const recent = a.recent || {};
                const r = a.rating || {};
                const card = document.createElement('div');
                card.className = 'horse-card';

                let rankBadge = '';
                if (a.rating) {
                    rankBadge = `<div class="rank-badge" title="Rang ${idx+1}">${idx+1}</div>`;
                }
                let scoreBar = '';
                if (a.rating) {
                    const maxRating = Math.max(...analyses.map(x => x.rating?.total || 0));
                    const pct = maxRating > 0 ? Math.min(100, Math.max(0, (r.total / maxRating) * 100)) : 0;
                    scoreBar = `<div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div><div class="score-bar-label">Rating : ${r.total}</div></div>`;
                }

                let html = `${rankBadge}
                    <div class="horse-header">
                        <div class="num">${att.numPmu}</div>
                        <div class="infos">
                            <h3>${att.nom || 'N/A'} <span class="age">${att.age || '?'} ans ${att.sexe || ''}</span></h3>
                            <div class="tags">
                                <span class="tag">${att.race || ''}</span>
                                <span class="tag">Corde ${att.corde || '?'}</span>
                                <span class="tag">Poids ${att.poids ? (att.poids/10 + ' kg') : 'N/A'}</span>
                                <span class="tag">${att.jockey || 'N/A'}</span>
                                <span class="tag trainer">${att.entraineur || 'N/A'}</span>
                                <span class="tag">${att.oeilleres || ''}</span>
                                <span class="tag">${att.robe || ''}</span>
                            </div>
                        </div>
                        <div class="musique">
                            <div class="label">Musique</div>
                            <div class="value">${att.musique || 'N/A'}</div>
                        </div>
                    </div>
                    ${scoreBar}
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-title">Score Global (toutes les courses)</div>
                            <div class="stat-body">
                                <div><strong>Courses:</strong> ${glob.total || 0}</div>
                                <div><strong>Score moy.:</strong> ${glob.score || 0} / 25</div>
                                <div><strong>Victoires:</strong> ${glob.nb_victoires || 0}</div>
                                <div><strong>Places 1-2-3:</strong> ${glob.nb_places || 0}</div>
                                <div><strong>Place moy.:</strong> ${glob.place_moy || 'N/A'}</div>
                                <div><strong>Gains carrière:</strong> ${att.gainsCarriere ? (att.gainsCarriere/100).toLocaleString('fr-FR') + ' €' : 'N/A'}</div>
                            </div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-title">Forme Récente (5 dernières)</div>
                            <div class="stat-body">
                                <div><strong>Courses:</strong> ${recent.total || 0}</div>
                                <div><strong>Score moy.:</strong> ${recent.score || 0} / 25</div>
                                <div><strong>Victoires:</strong> ${recent.nb_victoires || 0}</div>
                                <div><strong>Places 1-2-3:</strong> ${recent.nb_places || 0}</div>
                                <div><strong>Place moy.:</strong> ${recent.place_moy || 'N/A'}</div>
                            </div>
                        </div>
                `;

                html += buildCritereBox('Corde', a.byCorde, att.corde);
                html += buildCritereBox('Distance', a.byDistance, null);
                html += buildCritereBox('Discipline', a.byDiscipline, null);
                html += buildCritereBox('Jockey', a.byJockey, att.jockey);
                html += buildCritereBox('Hippodrome', a.byHippodrome, null);
                html += buildCritereBox('Terrain', a.byTerrain, null);

                html += `</div>`; // close stats-grid

                // Rating breakdown
                if (a.rating) {
                    const ad = r.adaptation_details || {};
                    html += `<div class="score-breakdown">
                        <h4>Rating Breakdown</h4>
                        <div class="breakdown-grid">
                            <div class="bd-item"><div class="bd-label">Global (25%)</div><div class="bd-val">${r.global || 0}</div></div>
                            <div class="bd-item"><div class="bd-label">Récent (30%)</div><div class="bd-val">${r.recent || 0}</div></div>
                            <div class="bd-item"><div class="bd-label">Musique (15%)</div><div class="bd-val">${r.musique || 0}</div></div>
                            <div class="bd-item"><div class="bd-label">Adaptation (30%)</div><div class="bd-val">${r.adaptation || 0}</div><div class="bd-sub">${Object.entries(ad).map(([k,v]) => k + ':' + v).join(' ')}</div></div>
                            <div class="bd-item ${r.bonus >= 0 ? 'positive' : 'negative'}"><div class="bd-label">Bonus/Malus</div><div class="bd-val">${r.bonus > 0 ? '+' : ''}${r.bonus || 0}</div></div>
                        </div>
                    </div>`;
                }

                // Historique détaillé
                if (a.history && a.history.length > 0) {
                    html += `<div class="history"><h4>10 dernières courses</h4><table>
                        <thead>
                            <tr><th>Date</th><th>Hippodrome</th><th>Prix</th><th>Disc.</th><th>Dist.</th><th>Terrain</th><th>Corde</th><th>Poids</th><th>Jockey</th><th>Place</th><th>Points</th><th>Statut</th></tr>
                        </thead><tbody>`;
                    a.history.forEach(h => {
                        const d = h.date ? new Date(h.date).toLocaleDateString('fr-FR') : 'N/A';
                        const pts = h.place !== undefined ? pointsPmu(h.place) : 0;
                        html += `<tr>
                            <td>${d}</td>
                            <td>${h.hippodrome || ''}</td>
                            <td>${h.nomPrix || ''}</td>
                            <td>${h.discipline || ''}</td>
                            <td>${h.distance || ''}</td>
                            <td>${h.etatTerrain || ''}</td>
                            <td>${h.corde || ''}</td>
                            <td>${h.poidsJockey ? (h.poidsJockey + ' kg') : ''}</td>
                            <td>${h.nomJockey || ''}</td>
                            <td class="place-${h.place === 1 ? '1' : (h.place && h.place <= 3 ? '3' : '')}">${h.place || '-'}</td>
                            <td>${pts}</td>
                            <td>${h.statusArrivee || ''}</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                html += `</div>`; // close horse-card
                card.innerHTML = html;
                results.appendChild(card);
            });

            results.classList.remove('hidden');
        }

        function pointsPmu(place) {
            if (place === null || place === undefined) return 0;
            if (place === 1) return 25;
            if (place === 2) return 20;
            if (place === 3) return 16;
            if (place === 4) return 13;
            if (place === 5) return 11;
            if (place === 6) return 10;
            if (place === 7) return 9;
            if (place === 8) return 8;
            if (place === 9) return 7;
            if (place === 10) return 6;
            if (place <= 15) return 3;
            return 1;
        }

        function buildCritereBox(title, data, currentValue) {
            if (!data || Object.keys(data).length === 0) return '';
            let rows = '';
            Object.entries(data).forEach(([k, v]) => {
                const highlight = (currentValue !== null && String(k) === String(currentValue)) ? 'highlight' : '';
                rows += `<tr class="${highlight}"><td>${k}</td><td>${v.total || 0}</td><td>${v.score || 0}</td><td>${v.nb_victoires || 0}</td><td>${v.nb_places || 0}</td><td>${v.place_moy || 'N/A'}</td><td>${v.delta > 0 ? '+' : ''}${v.delta || 0}</td></tr>`;
            });
            return `
                <div class="stat-box">
                    <div class="stat-title">${title}</div>
                    <div class="stat-body small">
                        <table class="mini-table">
                            <thead><tr><th>Critère</th><th>Total</th><th>Score</th><th>V</th><th>P123</th><th>Pl.Moy</th><th>Delta</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        dateInput.addEventListener('change', loadReunions);
        reunionSelect.addEventListener('change', populateCourses);
        courseSelect.addEventListener('change', updateCourseInfo);
        loadBtn.addEventListener('click', loadAnalysis);

        loadReunions();
    </script>

</html>
