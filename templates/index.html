<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Turf - Performance Rating</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏇 Analyse Turf - Performance Rating</h1>
            <p class="subtitle">Méthode Timeform-like : temps ajustés par niveau, poids, terrain, distance, corde</p>
        </header>

        <section class="controls">
            <div class="form-row">
                <div class="field">
                    <label for="dateInput">Date (JJMMAAAA)</label>
                    <input type="text" id="dateInput" placeholder="25062026" maxlength="8">
                </div>
                <div class="field">
                    <label for="reunionSelect">Réunion</label>
                    <select id="reunionSelect">
                        <option value="">Choisir une réunion</option>
                    </select>
                </div>
                <div class="field">
                    <label for="courseSelect">Course</label>
                    <select id="courseSelect">
                        <option value="">Choisir une course</option>
                    </select>
                </div>
                <div class="field btn-field">
                    <button id="loadBtn" class="btn-primary">Analyser la course</button>
                </div>
            </div>
            <div id="loading" class="loading hidden">Chargement des données...</div>
            <div id="errorMsg" class="error hidden"></div>
        </section>

        <section id="courseInfo" class="course-info hidden">
            <h2 id="courseTitle"></h2>
            <div id="courseMeta" class="meta"></div>
        </section>

        <section id="ranking" class="ranking hidden"></section>
        <section id="results" class="results hidden"></section>
    </div>

    <script>
        const dateInput = document.getElementById('dateInput');
        const reunionSelect = document.getElementById('reunionSelect');
        const courseSelect = document.getElementById('courseSelect');
        const loadBtn = document.getElementById('loadBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const courseInfo = document.getElementById('courseInfo');
        const courseTitle = document.getElementById('courseTitle');
        const courseMeta = document.getElementById('courseMeta');
        const results = document.getElementById('results');

        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        dateInput.value = dd + mm + yyyy;

        let reunionsData = [];
        let selectedCourseData = null;

        async function loadReunions() {
            const date = dateInput.value;
            if (!date || date.length !== 8) {
                showError('Date invalide. Format : JJMMAAAA');
                return;
            }
            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            try {
                const res = await fetch(`/api/reunions?date=${date}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                reunionsData = data.reunions || [];
                populateReunions();
            } catch (e) {
                showError('Erreur chargement réunions : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function populateReunions() {
            reunionSelect.innerHTML = '<option value="">Choisir une réunion</option>';
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            reunionsData.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.numOfficiel;
                opt.textContent = `R${r.numOfficiel} - ${r.hippodrome.libelleCourt || 'Hippodrome'} (${r.pays.libelle || 'FR'})`;
                reunionSelect.appendChild(opt);
            });
        }

        function populateCourses() {
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            const numReunion = reunionSelect.value;
            const reunion = reunionsData.find(r => String(r.numOfficiel) === numReunion);
            if (!reunion) return;

            reunion.courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.numOrdre;
                opt.textContent = `C${c.numOrdre} - ${c.libelleCourt || c.libelle || 'Course'} (${c.distance || '?'}m ${c.discipline || ''})`;
                opt.dataset.json = JSON.stringify(c);
                courseSelect.appendChild(opt);
            });
        }

        function updateCourseInfo() {
            const opt = courseSelect.selectedOptions[0];
            if (!opt || !opt.dataset.json) {
                courseInfo.classList.add('hidden');
                return;
            }
            selectedCourseData = JSON.parse(opt.dataset.json);
            courseTitle.textContent = `C${selectedCourseData.numOrdre} - ${selectedCourseData.libelle || ''}`;
            courseMeta.innerHTML = `
                <span><strong>Hippodrome:</strong> ${selectedCourseData.hippodrome?.libelleCourt || 'N/A'}</span>
                <span><strong>Distance:</strong> ${selectedCourseData.distance || 'N/A'} ${selectedCourseData.distanceUnit || ''}</span>
                <span><strong>Corde:</strong> ${selectedCourseData.corde || 'N/A'}</span>
                <span><strong>Discipline:</strong> ${selectedCourseData.discipline || 'N/A'} / ${selectedCourseData.specialite || 'N/A'}</span>
                <span><strong>Partants:</strong> ${selectedCourseData.nombreDeclaresPartants || 'N/A'}</span>
                <span><strong>Type:</strong> ${selectedCourseData.categorieParticularite || 'N/A'}</span>
                <span><strong>Condition:</strong> ${selectedCourseData.conditionAge || ''} - ${selectedCourseData.conditionSexe || ''}</span>
            `;
            courseInfo.classList.remove('hidden');
        }

        async function loadAnalysis() {
            if (!reunionSelect.value || !courseSelect.value) {
                showError('Sélectionnez une réunion et une course.');
                return;
            }
            const date = dateInput.value;
            const reunion = `R${reunionSelect.value}`;
            const course = courseSelect.value;

            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');
            try {
                const res = await fetch(`/api/analyse?date=${date}&reunion=${reunion}&course=${course}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                renderAnalyses(data.analyses);
            } catch (e) {
                showError('Erreur analyse : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function renderAnalyses(analyses) {
            results.innerHTML = '';
            if (!analyses || analyses.length === 0) {
                results.innerHTML = '<p class="no-data">Aucun participant trouvé.</p>';
                results.classList.remove('hidden');
                document.getElementById('ranking').classList.add('hidden');
                return;
            }

            const bestScore = analyses[0]?.score?.score ?? 0;

            // --- Classement ---
            let rankingHtml = '';
            if (analyses[0].score) {
                rankingHtml += '<div class="podium">';
                for (let i = 0; i < Math.min(3, analyses.length); i++) {
                    const a = analyses[i];
                    const s = a.score || {};
                    const c = s.components || {};
                    const ecart = (a.score.score - bestScore).toFixed(2);
                    const cls = i === 0 ? 'first' : (i === 1 ? 'second' : 'third');
                    rankingHtml += `
                        <div class="podium-item ${cls}">
                            <div class="rank">${i+1}</div>
                            <div class="podium-name">${a.attitude.nom || 'N/A'} <span class="podium-num">N°${a.attitude.numPmu}</span></div>
                            <div class="podium-score">Score ${a.score.score}</div>
                            <div class="podium-detail">+${ecart} vs 1er · ${a.ratings.total_courses} courses<br>
                            Moy:${c.rating_moyen} Réc:${c.rating_recent} Adap:${c.rating_adaptation}</div>
                        </div>
                    `;
                }
                rankingHtml += '</div>';

                rankingHtml += '<div class="rank-table"><h3>Classement complet (Score Performance Rating)</h3><table><thead><tr><th>Rang</th><th>N°</th><th>Nom</th><th>Score</th><th>Écart</th><th>Moyen</th><th>Récent</th><th>Adaptation</th><th>Tendance</th><th>Fiabilité</th><th>Courses</th></tr></thead><tbody>';
                analyses.forEach((a, i) => {
                    const s = a.score || {};
                    const c = s.components || {};
                    const r = a.ratings || {};
                    const ecart = (a.score.score - bestScore).toFixed(2);
                    const tend = r.rating_tendance < 0 ? '↘' : (r.rating_tendance > 0 ? '↗' : '→');
                    rankingHtml += `<tr><td class="rank-col">${i+1}</td><td>${a.attitude.numPmu}</td><td><strong>${a.attitude.nom}</strong></td><td class="score-total">${a.score.score}</td><td>+${ecart}</td><td>${c.rating_moyen || 'N/A'}</td><td>${c.rating_recent || 'N/A'}</td><td>${c.rating_adaptation || 'N/A'}</td><td>${tend} ${r.rating_tendance || 0}</td><td>${r.rating_fiabilite || 'N/A'}</td><td>${r.total_courses}</td></tr>`;
                });
                rankingHtml += '</tbody></table></div>';
            }
            const rankingSection = document.getElementById('ranking');
            rankingSection.innerHTML = rankingHtml;
            rankingSection.classList.remove('hidden');

            // --- Cartes détaillées ---
            analyses.forEach((a, idx) => {
                const att = a.attitude;
                const r = a.ratings || {};
                const s = a.score || {};
                const ad = a.adaptation || {};
                const card = document.createElement('div');
                card.className = 'horse-card';

                const ecart = (s.score - bestScore).toFixed(2);
                const tend = r.rating_tendance < 0 ? '↘ Amélioration' : (r.rating_tendance > 0 ? '↗ Baisse' : '→ Stable');

                let html = `
                    <div class="rank-badge" title="Rang ${idx+1}">${idx+1}</div>
                    <div class="horse-header">
                        <div class="num">${att.numPmu}</div>
                        <div class="infos">
                            <h3>${att.nom || 'N/A'} <span class="age">${att.age || '?'} ans ${att.sexe || ''}</span></h3>
                            <div class="tags">
                                <span class="tag">${att.race || ''}</span>
                                <span class="tag">Corde ${att.corde || '?'}</span>
                                <span class="tag">Poids ${att.poids ? (att.poids/10 + ' kg') : 'N/A'}</span>
                                <span class="tag">${att.jockey || 'N/A'}</span>
                                <span class="tag trainer">${att.entraineur || 'N/A'}</span>
                                <span class="tag">${att.oeilleres || ''}</span>
                            </div>
                        </div>
                        <div class="score-box">
                            <div class="score-label">Score PR</div>
                            <div class="score-value">${s.score || 'N/A'}</div>
                            <div class="score-detail">+${ecart} vs 1er</div>
                        </div>
                    </div>
                `;

                // Breakdown des composants
                if (s.components) {
                    const c = s.components;
                    html += `<div class="score-breakdown">
                        <h4>Breakdown du Score</h4>
                        <div class="breakdown-grid">
                            <div class="bd-item"><div class="bd-label">Rating Moyen (35%)</div><div class="bd-val">${c.rating_moyen}</div><div class="bd-sub">Temps ajusté moyen</div></div>
                            <div class="bd-item"><div class="bd-label">Rating Récent (30%)</div><div class="bd-val">${c.rating_recent}</div><div class="bd-sub">3 dernières courses</div></div>
                            <div class="bd-item"><div class="bd-label">Adaptation (20%)</div><div class="bd-val">${c.rating_adaptation}</div><div class="bd-sub">Corde, dist, jockey, hippo</div></div>
                            <div class="bd-item ${r.rating_tendance < 0 ? 'positive' : (r.rating_tendance > 0 ? 'negative' : '')}"><div class="bd-label">Tendance</div><div class="bd-val">${tend}</div><div class="bd-sub">${r.rating_tendance || 0}</div></div>
                            <div class="bd-item"><div class="bd-label">Fiabilité</div><div class="bd-val">${r.rating_fiabilite}</div><div class="bd-sub">Écart-type des PR</div></div>
                        </div>
                    </div>`;
                }

                // Adaptation détaillée
                if (ad.details && ad.details.length > 0) {
                    html += `<div class="criteres-table"><h4>Adaptation à la course du jour</h4><table class="crit-table">
                        <thead><tr><th>Critère</th><th>Valeur</th><th>Courses</th><th>PR</th><th>vs Moyen</th></tr></thead><tbody>`;
                    ad.details.forEach(d => {
                        const cls = d.delta < 0 ? 'positive' : (d.delta > 0 ? 'negative' : '');
                        html += `<tr><td><strong>${d.nom}</strong></td><td>${d.valeur}</td><td>${d.courses}</td><td>${d.pr}</td><td class="${cls}">${d.delta > 0 ? '+' : ''}${d.delta}</td></tr>`;
                    });
                    html += `<tr class="total-row"><td colspan="3"><strong>PR Adaptation moyen</strong></td><td colspan="2"><strong>${ad.rating_adaptation}</strong></td></tr>`;
                    html += `</tbody></table></div>`;
                }

                // Historique des courses avec PR
                if (r.details && r.details.length > 0) {
                    html += `<div class="history"><h4>Historique des courses (Performance Rating)</h4><table>
                        <thead>
                            <tr><th>Date</th><th>Hippodrome</th><th>Dist.</th><th>Disc.</th><th>Place</th><th>Terrain</th><th>Corde</th><th>Poids</th><th>Jockey</th><th>Temps/km</th><th>PR</th></tr>
                        </thead><tbody>`;
                    r.details.forEach(d => {
                        const date = d.date ? new Date(d.date).toLocaleDateString('fr-FR') : 'N/A';
                        html += `<tr>
                            <td>${date}</td>
                            <td>${d.hippodrome || ''}</td>
                            <td>${d.distance || ''}</td>
                            <td>${d.discipline || ''}</td>
                            <td class="place-${d.place === 1 ? '1' : (d.place && d.place <= 3 ? '3' : '')}">${d.place || '-'}</td>
                            <td>${d.etatTerrain || ''}</td>
                            <td>${d.corde || ''}</td>
                            <td>${d.poidsJockey ? (d.poidsJockey + 'kg') : ''}</td>
                            <td>${d.nomJockey || ''}</td>
                            <td class="temps-km">${d.temps_au_km ? formatTempsKm(d.temps_au_km) : 'N/A'}</td>
                            <td class="pr-val">${d.pr}</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                html += `</div>`;
                card.innerHTML = html;
                results.appendChild(card);
            });

            results.classList.remove('hidden');
        }

        function formatTempsKm(seconds) {
            if (seconds === null || seconds === undefined) return 'N/A';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            const c = Math.floor((seconds - Math.floor(seconds)) * 100);
            return `${m}:${s.toString().padStart(2, '0')}.${c.toString().padStart(2, '0')}`;
        }

        dateInput.addEventListener('change', loadReunions);
        reunionSelect.addEventListener('change', populateCourses);
        courseSelect.addEventListener('change', updateCourseInfo);
        loadBtn.addEventListener('click', loadAnalysis);

        loadReunions();
    </script>
</body>
</html>
