<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Turf - Temps de Course</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏇 Analyse Turf - Temps de Course</h1>
            <p class="subtitle">Classement par temps au kilomètre calculé (pas de cotes)</p>
        </header>

        <section class="controls">
            <div class="form-row">
                <div class="field">
                    <label for="dateInput">Date (JJMMAAAA)</label>
                    <input type="text" id="dateInput" placeholder="25062026" maxlength="8">
                </div>
                <div class="field">
                    <label for="reunionSelect">Réunion</label>
                    <select id="reunionSelect">
                        <option value="">Choisir une réunion</option>
                    </select>
                </div>
                <div class="field">
                    <label for="courseSelect">Course</label>
                    <select id="courseSelect">
                        <option value="">Choisir une course</option>
                    </select>
                </div>
                <div class="field btn-field">
                    <button id="loadBtn" class="btn-primary">Analyser la course</button>
                </div>
            </div>
            <div id="loading" class="loading hidden">Chargement des données...</div>
            <div id="errorMsg" class="error hidden"></div>
        </section>

        <section id="courseInfo" class="course-info hidden">
            <h2 id="courseTitle"></h2>
            <div id="courseMeta" class="meta"></div>
        </section>

        <section id="ranking" class="ranking hidden"></section>
        <section id="results" class="results hidden"></section>
    </div>

    <script>
        const dateInput = document.getElementById('dateInput');
        const reunionSelect = document.getElementById('reunionSelect');
        const courseSelect = document.getElementById('courseSelect');
        const loadBtn = document.getElementById('loadBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const courseInfo = document.getElementById('courseInfo');
        const courseTitle = document.getElementById('courseTitle');
        const courseMeta = document.getElementById('courseMeta');
        const results = document.getElementById('results');

        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        dateInput.value = dd + mm + yyyy;

        let reunionsData = [];
        let selectedCourseData = null;

        async function loadReunions() {
            const date = dateInput.value;
            if (!date || date.length !== 8) {
                showError('Date invalide. Format : JJMMAAAA');
                return;
            }
            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            try {
                const res = await fetch(`/api/reunions?date=${date}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                reunionsData = data.reunions || [];
                populateReunions();
            } catch (e) {
                showError('Erreur chargement réunions : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function populateReunions() {
            reunionSelect.innerHTML = '<option value="">Choisir une réunion</option>';
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            reunionsData.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.numOfficiel;
                opt.textContent = `R${r.numOfficiel} - ${r.hippodrome.libelleCourt || 'Hippodrome'} (${r.pays.libelle || 'FR'})`;
                reunionSelect.appendChild(opt);
            });
        }

        function populateCourses() {
            courseSelect.innerHTML = '<option value="">Choisir une course</option>';
            selectedCourseData = null;
            courseInfo.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');

            const numReunion = reunionSelect.value;
            const reunion = reunionsData.find(r => String(r.numOfficiel) === numReunion);
            if (!reunion) return;

            reunion.courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.numOrdre;
                opt.textContent = `C${c.numOrdre} - ${c.libelleCourt || c.libelle || 'Course'} (${c.distance || '?'}m ${c.discipline || ''})`;
                opt.dataset.json = JSON.stringify(c);
                courseSelect.appendChild(opt);
            });
        }

        function updateCourseInfo() {
            const opt = courseSelect.selectedOptions[0];
            if (!opt || !opt.dataset.json) {
                courseInfo.classList.add('hidden');
                return;
            }
            selectedCourseData = JSON.parse(opt.dataset.json);
            courseTitle.textContent = `C${selectedCourseData.numOrdre} - ${selectedCourseData.libelle || ''}`;
            courseMeta.innerHTML = `
                <span><strong>Hippodrome:</strong> ${selectedCourseData.hippodrome?.libelleCourt || 'N/A'}</span>
                <span><strong>Distance:</strong> ${selectedCourseData.distance || 'N/A'} ${selectedCourseData.distanceUnit || ''}</span>
                <span><strong>Corde:</strong> ${selectedCourseData.corde || 'N/A'}</span>
                <span><strong>Discipline:</strong> ${selectedCourseData.discipline || 'N/A'} / ${selectedCourseData.specialite || 'N/A'}</span>
                <span><strong>Partants:</strong> ${selectedCourseData.nombreDeclaresPartants || 'N/A'}</span>
                <span><strong>Type:</strong> ${selectedCourseData.categorieParticularite || 'N/A'}</span>
                <span><strong>Condition:</strong> ${selectedCourseData.conditionAge || ''} - ${selectedCourseData.conditionSexe || ''}</span>
            `;
            courseInfo.classList.remove('hidden');
        }

        async function loadAnalysis() {
            if (!reunionSelect.value || !courseSelect.value) {
                showError('Sélectionnez une réunion et une course.');
                return;
            }
            const date = dateInput.value;
            const reunion = `R${reunionSelect.value}`;
            const course = courseSelect.value;

            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            results.classList.add('hidden');
            document.getElementById('ranking').classList.add('hidden');
            try {
                const res = await fetch(`/api/analyse?date=${date}&reunion=${reunion}&course=${course}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                renderAnalyses(data.analyses);
            } catch (e) {
                showError('Erreur analyse : ' + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function renderAnalyses(analyses) {
            results.innerHTML = '';
            if (!analyses || analyses.length === 0) {
                results.innerHTML = '<p class="no-data">Aucun participant trouvé.</p>';
                results.classList.remove('hidden');
                document.getElementById('ranking').classList.add('hidden');
                return;
            }

            // Meilleur temps pour l'écart
            const bestTemps = analyses[0]?.temps?.temps_estime || 0;

            // --- Classement ---
            let rankingHtml = '';
            if (analyses[0].temps?.temps_estime !== undefined) {
                rankingHtml += '<div class="podium">';
                for (let i = 0; i < Math.min(3, analyses.length); i++) {
                    const a = analyses[i];
                    const t = a.temps || {};
                    const ecart = t.temps_estime ? (t.temps_estime - bestTemps).toFixed(2) : '?';
                    const cls = i === 0 ? 'first' : (i === 1 ? 'second' : 'third');
                    rankingHtml += `
                        <div class="podium-item ${cls}">
                            <div class="rank">${i+1}</div>
                            <div class="podium-name">${a.attitude.nom || 'N/A'} <span class="podium-num">N°${a.attitude.numPmu}</span></div>
                            <div class="podium-temps">${t.temps_estime_formatted || 'N/A'}/km</div>
                            <div class="podium-detail">Écart: +${ecart}s/km · ${t.total_courses || 0} courses</div>
                        </div>
                    `;
                }
                rankingHtml += '</div>';

                rankingHtml += '<div class="rank-table"><h3>Classement par temps estimé au km</h3><table><thead><tr><th>Rang</th><th>N°</th><th>Nom</th><th>Temps estimé/km</th><th>Écart</th><th>Global</th><th>Même dist.</th><th>Récent</th><th>Courses</th></tr></thead><tbody>';
                analyses.forEach((a, i) => {
                    const t = a.temps || {};
                    const ecart = t.temps_estime ? (t.temps_estime - bestTemps).toFixed(2) : '?';
                    rankingHtml += `<tr><td class="rank-col">${i+1}</td><td>${a.attitude.numPmu}</td><td><strong>${a.attitude.nom}</strong></td><td class="temps-total">${t.temps_estime_formatted || 'N/A'}</td><td>+${ecart}s</td><td>${t.temps_formatted || 'N/A'}</td><td>${t.temps_formatted_meme_distance || 'N/A'}</td><td>${t.temps_formatted_3_dernieres || 'N/A'}</td><td>${t.total_courses}</td></tr>`;
                });
                rankingHtml += '</tbody></table></div>';
            }
            const rankingSection = document.getElementById('ranking');
            rankingSection.innerHTML = rankingHtml;
            rankingSection.classList.remove('hidden');

            // --- Cartes détaillées ---
            analyses.forEach((a, idx) => {
                const att = a.attitude;
                const t = a.temps || {};
                const card = document.createElement('div');
                card.className = 'horse-card';

                const ecart = t.temps_estime ? (t.temps_estime - bestTemps).toFixed(2) : '?';

                let html = `
                    <div class="rank-badge" title="Rang ${idx+1}">${idx+1}</div>
                    <div class="horse-header">
                        <div class="num">${att.numPmu}</div>
                        <div class="infos">
                            <h3>${att.nom || 'N/A'} <span class="age">${att.age || '?'} ans ${att.sexe || ''}</span></h3>
                            <div class="tags">
                                <span class="tag">${att.race || ''}</span>
                                <span class="tag">Corde ${att.corde || '?'}</span>
                                <span class="tag">Poids ${att.poids ? (att.poids/10 + ' kg') : 'N/A'}</span>
                                <span class="tag">${att.jockey || 'N/A'}</span>
                                <span class="tag trainer">${att.entraineur || 'N/A'}</span>
                                <span class="tag">${att.oeilleres || ''}</span>
                            </div>
                        </div>
                        <div class="temps-box">
                            <div class="temps-label">Temps estimé</div>
                            <div class="temps-value">${t.temps_estime_formatted || 'N/A'}/km</div>
                            <div class="temps-ecart">+${ecart}s vs meilleur</div>
                        </div>
                    </div>
                    <div class="temps-stats">
                        <div class="temps-stat">
                            <div class="ts-label">Global</div>
                            <div class="ts-val">${t.temps_formatted || 'N/A'}</div>
                            <div class="ts-sub">${t.total_courses} courses</div>
                        </div>
                        <div class="temps-stat">
                            <div class="ts-label">Même distance</div>
                            <div class="ts-val">${t.temps_formatted_meme_distance || 'N/A'}</div>
                            <div class="ts-sub">${t.courses_meme_distance} courses</div>
                        </div>
                        <div class="temps-stat">
                            <div class="ts-label">Forme récente</div>
                            <div class="ts-val">${t.temps_formatted_3_dernieres || 'N/A'}</div>
                            <div class="ts-sub">3 dernières</div>
                        </div>
                        <div class="temps-stat">
                            <div class="ts-label">Régularité</div>
                            <div class="ts-val">${t.ecart_type || 'N/A'}s</div>
                            <div class="ts-sub">Écart-type</div>
                        </div>
                        <div class="temps-stat">
                            <div class="ts-label">Meilleur</div>
                            <div class="ts-val">${t.temps_min ? formatTemps(t.temps_min) : 'N/A'}</div>
                            <div class="ts-sub">Record</div>
                        </div>
                        <div class="temps-stat">
                            <div class="ts-label">Pire</div>
                            <div class="ts-val">${t.temps_max ? formatTemps(t.temps_max) : 'N/A'}</div>
                            <div class="ts-sub">Pire perf</div>
                        </div>
                    </div>
                `;

                // Historique détaillé avec temps
                if (t.details && t.details.length > 0) {
                    html += `<div class="history"><h4>Historique des courses (temps au km calculé)</h4><table>
                        <thead>
                            <tr><th>Date</th><th>Hippodrome</th><th>Prix</th><th>Dist.</th><th>Disc.</th><th>Terrain</th><th>Corde</th><th>Poids</th><th>Jockey</th><th>Place</th><th>Temps/km</th><th>Écart</th></tr>
                        </thead><tbody>`;
                    t.details.forEach(h => {
                        const d = h.date ? new Date(h.date).toLocaleDateString('fr-FR') : 'N/A';
                        const ecartRef = t.temps_moyen ? (h.temps_au_km - t.temps_moyen).toFixed(2) : '?';
                        const ecartClass = parseFloat(ecartRef) < 0 ? 'positive' : 'negative';
                        html += `<tr>
                            <td>${d}</td>
                            <td>${h.hippodrome || ''}</td>
                            <td>${h.nomPrix || ''}</td>
                            <td>${h.distance || ''}</td>
                            <td>${h.discipline || ''}</td>
                            <td>${h.etatTerrain || ''}</td>
                            <td>${h.corde || ''}</td>
                            <td>${h.poidsJockey ? (h.poidsJockey + ' kg') : ''}</td>
                            <td>${h.nomJockey || ''}</td>
                            <td class="place-${h.place === 1 ? '1' : (h.place && h.place <= 3 ? '3' : '')}">${h.place || '-'}</td>
                            <td class="temps-km">${h.temps_formatted}</td>
                            <td class="${ecartClass}">${ecartRef > 0 ? '+' : ''}${ecartRef}s</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                html += `</div>`;
                card.innerHTML = html;
                results.appendChild(card);
            });

            results.classList.remove('hidden');
        }

        function formatTemps(seconds) {
            if (seconds === null || seconds === undefined) return 'N/A';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            const c = Math.floor((seconds - Math.floor(seconds)) * 100);
            return `${m}:${s.toString().padStart(2, '0')}.${c.toString().padStart(2, '0')}`;
        }

        dateInput.addEventListener('change', loadReunions);
        reunionSelect.addEventListener('change', populateCourses);
        courseSelect.addEventListener('change', updateCourseInfo);
        loadBtn.addEventListener('click', loadAnalysis);

        loadReunions();
    </script>
</body>
</html>
